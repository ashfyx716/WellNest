# Local dev without MySQL: run with profile "dev"
# Example: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Or in IntelliJ: Active profiles = dev

spring.datasource.url=jdbc:h2:mem:wellnest;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
