# Local dev without MySQL: run with profile "dev"
# Example: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Or in IntelliJ: Active profiles = dev

# File-based H2 for persistence across restarts
spring.datasource.url=jdbc:h2:file:./.data/wellnest;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

bert.emotion.url=http://localhost:8002
