spring.application.name=wellnest
# Use profile "dev" for in-memory H2 (no MySQL): see application-dev.properties
spring.datasource.url=jdbc:mysql://localhost:3306/wellnest_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=wellnest_jwt_secret_key_2024_minimum_256_bits_for_hs256_algorithm_wellnest
jwt.expiration=86400000

openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o
openai.url=https://api.openai.com/v1/chat/completions

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

wellnest.upload.dir=uploads

server.port=8081

ml.service.url=http://localhost:8001
